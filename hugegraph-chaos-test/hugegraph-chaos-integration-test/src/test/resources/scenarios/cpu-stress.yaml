scenario:
  name: "cpu-stress"
  description: "Inject CPU stress on local node and verify recovery"

target:
  env: local
  local:
    clusterConfig: "cluster-test-single.yaml"

steps:
  - name: "inject-cpu-stress"
    type: fault
    action:
      type: cpu_stress
      target: "localhost"
      duration: 10s
      recovery: auto
      params:
        cores: 2

  - name: "wait-for-stress"
    type: wait
    duration: 5s

  - name: "verify-system-responsive"
    type: assertion
    action:
      type: http
      url: "http://localhost:8080/graphs"
      expectedStatus: 200

report:
  format: [html, json]
  outputDir: "target/chaos-reports"
  includeLogs: true
