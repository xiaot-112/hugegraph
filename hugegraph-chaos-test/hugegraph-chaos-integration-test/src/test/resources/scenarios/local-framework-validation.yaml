scenario:
  name: "local-framework-validation"
  description: "Validate chaos framework core functions without HugeGraph dependency"

target:
  env: LOCAL
  local:
    clusterConfig: "none"

steps:
  - name: "inject-cpu-stress"
    type: FAULT
    action:
      type: cpu_stress
      target: "localhost"
      duration: 5s
      recovery: auto
      params:
        cores: 1

  - name: "wait-after-cpu"
    type: WAIT
    duration: 2s

  - name: "inject-memory-stress"
    type: FAULT
    action:
      type: memory_stress
      target: "localhost"
      duration: 5s
      recovery: auto
      params:
        size: 128M

  - name: "wait-after-memory"
    type: WAIT
    duration: 2s

  - name: "inject-network-delay"
    type: FAULT
    action:
      type: network_delay
      target: "localhost"
      duration: 5s
      recovery: auto
      params:
        latency: 100
        jitter: 20

  - name: "wait-after-network-delay"
    type: WAIT
    duration: 2s

  - name: "inject-network-loss"
    type: FAULT
    action:
      type: network_loss
      target: "localhost"
      duration: 5s
      recovery: auto
      params:
        loss: 50

  - name: "wait-after-network-loss"
    type: WAIT
    duration: 2s

report:
  format: [html, json, markdown]
  outputDir: "target/chaos-reports"
  includeLogs: true
