name: "Chaos Test"

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - kubernetes
      scenario:
        description: 'Scenario file'
        required: true
        default: 'scenarios/cpu-stress.yaml'
        type: choice
        options:
          - scenarios/cpu-stress.yaml
          - scenarios/network-delay.yaml
          - scenarios/pod-kill.yaml
      report_format:
        description: 'Report format'
        required: false
        default: 'html,json'
        type: string

jobs:
  chaos-test:
    runs-on: ubuntu-22.04
    env:
      TRAVIS_DIR: hugegraph-server/hugegraph-dist/src/assembly/travis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Install stress-ng
        if: ${{ github.event.inputs.target == 'local' }}
        run: sudo apt-get update && sudo apt-get install -y stress-ng iproute2

      - name: Resolve project version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build project
        run: |
          mvn clean package -DskipTests -Dmaven.javadoc.skip=true -ntp

      - name: Start HugeGraph PD
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          bash $TRAVIS_DIR/start-pd.sh

      - name: Start HugeGraph Store
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          bash $TRAVIS_DIR/start-store.sh

      - name: Start HugeGraph Server
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          SERVER_DIR=hugegraph-server/apache-hugegraph-server-$VERSION
          bash $TRAVIS_DIR/start-server.sh "$SERVER_DIR" memory

      - name: Wait for HugeGraph ready
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/graphs || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "HugeGraph is ready (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for HugeGraph... ($i/30)"
            sleep 2
          done
          echo "HugeGraph did not become ready in time"
          exit 1

      - name: Build chaos module
        run: |
          mvn package -pl hugegraph-chaos-test/hugegraph-chaos-core -am \
              -DskipTests -Dmaven.javadoc.skip=true -ntp

      - name: Run chaos test
        run: |
          SCENARIO_FILE="hugegraph-chaos-test/hugegraph-chaos-integration-test/src/test/resources/${{ github.event.inputs.scenario }}"
          java -Dchaos.config="$SCENARIO_FILE" \
               -Dchaos.target=${{ github.event.inputs.target }} \
               -Dchaos.report.format=${{ github.event.inputs.report_format }} \
               -jar hugegraph-chaos-test/hugegraph-chaos-core/target/hugegraph-chaos-core-*.jar
          echo "=== Chaos test exit code: $? ==="

      - name: Show chaos report
        if: always()
        run: |
          echo "=== JSON Report ==="
          cat target/chaos-reports/report.json 2>/dev/null || echo "No JSON report found"
          echo ""
          echo "=== Report files ==="
          find . -name "report.*" -path "*/chaos-reports/*" 2>/dev/null

      - name: Show server log on failure
        if: failure()
        run: |
          SERVER_DIR=hugegraph-server/apache-hugegraph-server-$VERSION
          if [ -f "$SERVER_DIR/logs/hugegraph-server.log" ]; then
            tail -n 200 "$SERVER_DIR/logs/hugegraph-server.log"
          fi

      - name: Stop HugeGraph Server
        if: always() && github.event.inputs.target == 'local'
        run: |
          SERVER_DIR=hugegraph-server/apache-hugegraph-server-$VERSION
          if [ -f "$SERVER_DIR/bin/pid" ]; then
            $TRAVIS_DIR/stop-server.sh "$SERVER_DIR" || true
          fi

      - name: Stop HugeGraph Store
        if: always() && github.event.inputs.target == 'local'
        run: |
          bash $TRAVIS_DIR/stop-store.sh || true

      - name: Stop HugeGraph PD
        if: always() && github.event.inputs.target == 'local'
        run: |
          bash $TRAVIS_DIR/stop-pd.sh || true

      - name: Upload chaos report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-report-${{ github.run_id }}
          path: |
            target/chaos-reports/
            hugegraph-chaos-test/target/chaos-reports/
          retention-days: 7
          if-no-files-found: ignore
