name: "Chaos Test"

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - kubernetes
      scenario:
        description: 'Scenario file'
        required: true
        default: 'scenarios/cpu-stress.yaml'
        type: choice
        options:
          - scenarios/cpu-stress.yaml
          - scenarios/network-delay.yaml
          - scenarios/pod-kill.yaml
      report_format:
        description: 'Report format'
        required: false
        default: 'html,json'
        type: string
      pd_count:
        description: 'Number of PD nodes'
        required: false
        default: '3'
        type: string
      store_count:
        description: 'Number of Store nodes'
        required: false
        default: '3'
        type: string
      server_count:
        description: 'Number of Server nodes'
        required: false
        default: '3'
        type: string

jobs:
  chaos-test:
    runs-on: ubuntu-latest
    env:
      TRAVIS_DIR: hugegraph-server/hugegraph-dist/src/assembly/travis
      BACKEND: hstore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Install stress-ng
        if: ${{ github.event.inputs.target == 'local' }}
        run: sudo apt-get update && sudo apt-get install -y stress-ng iproute2

      - name: Build project
        run: |
          mvn clean package -DskipTests -Dmaven.javadoc.skip=true -ntp

      - name: Start HugeGraph cluster via ClusterLauncher
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          CT_JAR=$(find hugegraph-cluster-test -name "hg-ct-*.jar" -path "*/lib/*" | head -1)
          if [ -z "$CT_JAR" ]; then
            CT_JAR=$(find hugegraph-cluster-test -name "hg-ct-*.jar" | head -1)
          fi
          if [ -z "$CT_JAR" ]; then
            echo "ERROR: ClusterLauncher jar not found"
            find hugegraph-cluster-test -name "*.jar" | head -20
            exit 1
          fi
          echo "Using ClusterLauncher: $CT_JAR"
          java -jar "$CT_JAR" \
            --pd ${{ github.event.inputs.pd_count }} \
            --store ${{ github.event.inputs.store_count }} \
            --server ${{ github.event.inputs.server_count }} \
            --timeout 300000 &
          CLUSTER_PID=$!
          echo "CLUSTER_PID=$CLUSTER_PID" >> $GITHUB_ENV
          echo "Cluster starting with PID=$CLUSTER_PID"

      - name: Wait for HugeGraph cluster ready
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/graphs 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "HugeGraph cluster is ready (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for cluster... ($i/60)"
            sleep 5
          done
          echo "Cluster did not become ready in time"
          kill $CLUSTER_PID 2>/dev/null || true
          exit 1

      - name: Run chaos test
        run: |
          SCENARIO_FILE="hugegraph-chaos-test/hugegraph-chaos-integration-test/src/test/resources/${{ github.event.inputs.scenario }}"
          java -Dchaos.config="$SCENARIO_FILE" \
               -Dchaos.target=${{ github.event.inputs.target }} \
               -Dchaos.report.format=${{ github.event.inputs.report_format }} \
               -jar hugegraph-chaos-test/hugegraph-chaos-core/target/hugegraph-chaos-core-*.jar

      - name: Show chaos report
        if: always()
        run: |
          echo "=== JSON Report ==="
          cat target/chaos-reports/report.json 2>/dev/null || echo "No JSON report found"
          echo ""
          echo "=== Report files ==="
          find . -name "report.*" -path "*/chaos-reports/*" 2>/dev/null

      - name: Stop HugeGraph cluster
        if: always() && github.event.inputs.target == 'local'
        run: |
          if [ -n "$CLUSTER_PID" ]; then
            kill $CLUSTER_PID 2>/dev/null || true
          fi

      - name: Upload chaos report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-report-${{ github.run_id }}
          path: |
            target/chaos-reports/
            hugegraph-chaos-test/target/chaos-reports/
          retention-days: 7
          if-no-files-found: ignore
