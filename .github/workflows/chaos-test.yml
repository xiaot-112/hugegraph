name: "Chaos Test"

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - kubernetes
      scenario:
        description: 'Scenario file'
        required: true
        default: 'scenarios/local-stress-test.yaml'
        type: choice
        options:
          - scenarios/local-stress-test.yaml
          - scenarios/local-framework-validation.yaml
          - scenarios/cpu-stress.yaml
          - scenarios/network-delay.yaml
          - scenarios/pod-kill.yaml
      report_format:
        description: 'Report format (comma-separated: html,json,markdown)'
        required: false
        default: 'html,json'
        type: string
      pd_count:
        description: 'Number of PD nodes'
        required: false
        default: '3'
        type: string
      store_count:
        description: 'Number of Store nodes'
        required: false
        default: '3'
        type: string
      server_count:
        description: 'Number of Server nodes'
        required: false
        default: '3'
        type: string

jobs:
  chaos-test:
    runs-on: ubuntu-22.04
    env:
      USE_STAGE: 'false'
      TRAVIS_DIR: hugegraph-server/hugegraph-dist/src/assembly/travis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Use staged maven repo settings
        if: ${{ env.USE_STAGE == 'true' }}
        run: |
          cp $HOME/.m2/settings.xml /tmp/settings.xml || true
          mv -vf .github/configs/settings.xml $HOME/.m2/settings.xml

      - name: Install stress-ng and iproute2
        if: ${{ github.event.inputs.target == 'local' }}
        run: sudo apt-get update && sudo apt-get install -y stress-ng iproute2

      - name: Build or fetch hugegraph-struct
        run: |
          REVISION=$(mvn -q -DforceStdout help:evaluate -Dexpression=revision -f pom.xml)
          if [ -f hugegraph-struct/pom.xml ]; then
            echo "[INFO] Found hugegraph-struct source, building from source"
            mvn -U -ntp -DskipTests -pl hugegraph-struct -am install
          else
            echo "[INFO] hugegraph-struct source not found, fetching artifact $REVISION"
            mvn -U -ntp dependency:get -Dartifact=org.apache.hugegraph:hugegraph-struct:$REVISION
          fi

      - name: Build project
        run: |
          mvn clean package -U -Dmaven.javadoc.skip=true -Dmaven.test.skip=true -ntp --fail-at-end

      - name: Start HugeGraph cluster
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          bash hugegraph-chaos-test/scripts/start-cluster.sh \
            ${{ github.event.inputs.pd_count }} \
            ${{ github.event.inputs.store_count }} \
            ${{ github.event.inputs.server_count }}

      - name: Wait for HugeGraph cluster ready
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/graphs 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "HugeGraph cluster is ready (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for cluster... ($i/60)"
            sleep 5
          done
          echo "Cluster did not become ready in time"
          exit 1

      - name: Run chaos test
        run: |
          SCENARIO_FILE="hugegraph-chaos-test/hugegraph-chaos-integration-test/src/test/resources/${{ github.event.inputs.scenario }}"
          java -Dchaos.config="$SCENARIO_FILE" \
               -Dchaos.target=${{ github.event.inputs.target }} \
               -Dchaos.report.format=${{ github.event.inputs.report_format }} \
               -jar hugegraph-chaos-test/hugegraph-chaos-core/target/hugegraph-chaos-core-*.jar

      - name: Show chaos report
        if: always()
        run: |
          echo "=== JSON Report ==="
          cat target/chaos-reports/report.json 2>/dev/null || echo "No JSON report found at target/chaos-reports/"
          echo ""
          echo "=== Report files ==="
          find . -name "report.*" -path "*/chaos-reports/*" 2>/dev/null

      - name: Stop HugeGraph cluster
        if: always() && github.event.inputs.target == 'local'
        run: |
          bash hugegraph-chaos-test/scripts/stop-cluster.sh || true

      - name: Upload chaos report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-report-${{ github.run_id }}
          path: |
            target/chaos-reports/
            hugegraph-chaos-test/target/chaos-reports/
            hugegraph-chaos-test/hugegraph-chaos-core/target/chaos-reports/
          retention-days: 7
          if-no-files-found: ignore
