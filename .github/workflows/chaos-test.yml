name: "Chaos Test"

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - kubernetes
      scenario:
        description: 'Scenario file'
        required: true
        default: 'scenarios/cpu-stress.yaml'
        type: choice
        options:
          - scenarios/cpu-stress.yaml
          - scenarios/network-delay.yaml
          - scenarios/pod-kill.yaml
      report_format:
        description: 'Report format'
        required: false
        default: 'html,json'
        type: string

jobs:
  chaos-test:
    runs-on: ubuntu-latest
    env:
      TRAVIS_DIR: hugegraph-server/hugegraph-dist/src/assembly/travis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Install stress-ng
        if: ${{ github.event.inputs.target == 'local' }}
        run: sudo apt-get update && sudo apt-get install -y stress-ng iproute2

      - name: Resolve project version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build project
        run: |
          mvn clean package -DskipTests -Dmaven.javadoc.skip=true -ntp

      - name: Start HugeGraph PD
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          PD_ASSEMBLY=$(find $(pwd)/hugegraph-pd -maxdepth 2 -type d -name "apache-hugegraph-pd-*" | head -1)
          PD_STATIC=$(pwd)/hugegraph-pd/hg-pd-dist/src/assembly/static
          if [ -n "$PD_ASSEMBLY" ] && [ -d "$PD_ASSEMBLY" ]; then
            PD_DIR="$PD_ASSEMBLY"
          elif [ -d "$PD_STATIC" ] && [ -d "$PD_STATIC/bin" ]; then
            PD_DIR="$PD_STATIC"
          else
            echo "ERROR: PD distribution not found"
            exit 1
          fi
          echo "PD dir: $PD_DIR"
          chmod +x "$PD_DIR/bin/"*.sh
          pushd "$PD_DIR"
          . bin/start-hugegraph-pd.sh
          sleep 10
          popd

      - name: Start HugeGraph Store
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          STORE_ASSEMBLY=$(find $(pwd)/hugegraph-store -maxdepth 2 -type d -name "apache-hugegraph-store-*" | head -1)
          STORE_STATIC=$(pwd)/hugegraph-store/hg-store-dist/src/assembly/static
          if [ -n "$STORE_ASSEMBLY" ] && [ -d "$STORE_ASSEMBLY" ]; then
            STORE_DIR="$STORE_ASSEMBLY"
          elif [ -d "$STORE_STATIC" ] && [ -d "$STORE_STATIC/bin" ]; then
            STORE_DIR="$STORE_STATIC"
          else
            echo "ERROR: Store distribution not found"
            exit 1
          fi
          echo "Store dir: $STORE_DIR"
          chmod +x "$STORE_DIR/bin/"*.sh
          pushd "$STORE_DIR"
          . bin/start-hugegraph-store.sh
          sleep 10
          popd

      - name: Start HugeGraph Server
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          SERVER_ASSEMBLY=$(find $(pwd)/hugegraph-server -maxdepth 2 -type d -name "apache-hugegraph-server-*" | head -1)
          SERVER_STATIC=$(pwd)/hugegraph-server/hugegraph-dist/src/assembly/static
          if [ -n "$SERVER_ASSEMBLY" ] && [ -d "$SERVER_ASSEMBLY" ]; then
            SERVER_DIR="$SERVER_ASSEMBLY"
          elif [ -d "$SERVER_STATIC" ] && [ -d "$SERVER_STATIC/bin" ]; then
            SERVER_DIR="$SERVER_STATIC"
          else
            echo "ERROR: Server distribution not found"
            exit 1
          fi
          echo "Server dir: $SERVER_DIR"
          chmod +x "$SERVER_DIR/bin/"*.sh
          bash $TRAVIS_DIR/start-server.sh "$SERVER_DIR" memory 60

      - name: Wait for HugeGraph ready
        if: ${{ github.event.inputs.target == 'local' }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/graphs || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "HugeGraph is ready (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for HugeGraph... ($i/30)"
            sleep 2
          done
          echo "HugeGraph did not become ready in time"
          exit 1

      - name: Build chaos module
        run: |
          mvn package -pl hugegraph-chaos-test/hugegraph-chaos-core -am \
              -DskipTests -Dmaven.javadoc.skip=true -ntp

      - name: Run chaos test
        run: |
          SCENARIO_FILE="hugegraph-chaos-test/hugegraph-chaos-integration-test/src/test/resources/${{ github.event.inputs.scenario }}"
          java -Dchaos.config="$SCENARIO_FILE" \
               -Dchaos.target=${{ github.event.inputs.target }} \
               -Dchaos.report.format=${{ github.event.inputs.report_format }} \
               -jar hugegraph-chaos-test/hugegraph-chaos-core/target/hugegraph-chaos-core-*.jar

      - name: Stop HugeGraph Server
        if: always() && github.event.inputs.target == 'local'
        run: |
          SERVER_DIR=$(find $(pwd)/hugegraph-server -maxdepth 2 -type d -name "apache-hugegraph-server-*" | head -1)
          if [ -z "$SERVER_DIR" ]; then
            SERVER_DIR=$(pwd)/hugegraph-server/hugegraph-dist/src/assembly/static
          fi
          if [ -d "$SERVER_DIR" ] && [ -f "$SERVER_DIR/bin/stop-hugegraph.sh" ]; then
            "$SERVER_DIR/bin/stop-hugegraph.sh" || true
          fi

      - name: Stop HugeGraph Store
        if: always() && github.event.inputs.target == 'local'
        run: |
          STORE_DIR=$(find $(pwd)/hugegraph-store -maxdepth 2 -type d -name "apache-hugegraph-store-*" | head -1)
          if [ -z "$STORE_DIR" ]; then
            STORE_DIR=$(pwd)/hugegraph-store/hg-store-dist/src/assembly/static
          fi
          if [ -d "$STORE_DIR" ] && [ -f "$STORE_DIR/bin/stop-hugegraph-store.sh" ]; then
            "$STORE_DIR/bin/stop-hugegraph-store.sh" || true
          fi

      - name: Stop HugeGraph PD
        if: always() && github.event.inputs.target == 'local'
        run: |
          PD_DIR=$(find $(pwd)/hugegraph-pd -maxdepth 2 -type d -name "apache-hugegraph-pd-*" | head -1)
          if [ -z "$PD_DIR" ]; then
            PD_DIR=$(pwd)/hugegraph-pd/hg-pd-dist/src/assembly/static
          fi
          if [ -d "$PD_DIR" ] && [ -f "$PD_DIR/bin/stop-hugegraph-pd.sh" ]; then
            "$PD_DIR/bin/stop-hugegraph-pd.sh" || true
          fi

      - name: Upload chaos report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-report-${{ github.run_id }}
          path: hugegraph-chaos-test/target/chaos-reports/
          retention-days: 7
